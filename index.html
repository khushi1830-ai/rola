<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coastal Clothing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f4f4;
color:#333;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
position:sticky;
top:0;
z-index:10;
}

.logo{
font-size:24px;
font-weight:700;
color:#111;
}

nav a{
margin:0 15px;
text-decoration:none;
color:#333;
font-weight:500;
}

nav a:hover{
color:#ff4d4d;
}

.hero{
height:80vh;
background:url("https://images.unsplash.com/photo-1521335629791-ce4aec67dd47") center/cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.hero h1{
font-size:60px;
background:rgba(0,0,0,0.4);
padding:20px 40px;
border-radius:10px;
}

.products{
padding:60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card-content h3{
margin-bottom:10px;
}

.price{
color:#ff4d4d;
font-weight:600;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
background:#111;
color:white;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff4d4d;
}

.cart{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:15px 20px;
border-radius:30px;
font-weight:bold;
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
margin-top:50px;
}

.search{
padding:20px 60px;
}

.search input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<header>

<div class="logo">Coastal</div>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">
<h1>New Fashion Collection</h1>
</section>

<div class="search">
<input type="text" id="search" placeholder="Search clothes...">
</div>

<section class="products" id="productList">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975922284-8b456906c813">
<div class="card-content">
<h3>Black Hoodie</h3>
<p class="price">$39</p>
<button onclick="addCart()">Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523381294911-8d3cead13475">
<div class="card-content">
<h3>Street Jacket</h3>
<p class="price">$69</p>
<button onclick="addCart()">Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
<div class="card-content">
<h3>Casual T-Shirt</h3>
<p class="price">$25</p>
<button onclick="addCart()">Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503341504253-dff4815485f1">
<div class="card-content">
<h3>Denim Jacket</h3>
<p class="price">$79</p>
<button onclick="addCart()">Add to Cart</button>
</div>
</div>

</section>

<div class="cart">
Cart: <span id="cartCount">0</span>
</div>

<footer>
<p>© 2026 Coastal Clothing | Modern Fashion Store</p>
</footer>

<script>

let cart=0;

function addCart(){
cart++;
document.getElementById("cartCount").innerText=cart;
}

document.getElementById("search").addEventListener("keyup",function(){

let filter=this.value.toLowerCase();
let products=document.querySelectorAll(".card");

products.forEach(product=>{

let text=product.innerText.toLowerCase();

product.style.display=text.includes(filter)?"block":"none";

});

});

</script>

</body>
</html>
